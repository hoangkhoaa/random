<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Flip — random</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <style>
    /* ---- 3D Coin ---- */
    .coin-scene {
      width: 160px;
      height: 160px;
      perspective: 600px;
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0s; /* controlled by animation */
    }

    .coin.flip-heads {
      animation: coin-flip-heads 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    .coin.flip-tails {
      animation: coin-flip-tails 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes coin-flip-heads {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(720deg); }
    }

    @keyframes coin-flip-tails {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(900deg); }  /* 720 + 180 = tails side */
    }

    .coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      font-size: 3.5rem;
      font-weight: 900;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 3px solid rgba(255,255,255,0.15);
    }

    .coin-face.heads {
      background: radial-gradient(circle at 35% 35%, #f7d060, #c9920a);
      transform: rotateY(0deg);
      color: #7a5500;
    }

    .coin-face.tails {
      background: radial-gradient(circle at 35% 35%, #d0d8e8, #7a8aa8);
      transform: rotateY(180deg);
      color: #3a4a5a;
    }

    .face-label {
      font-size: var(--font-size-sm);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: var(--space-1);
    }

    /* Result text */
    .result-text {
      font-size: var(--font-size-3xl);
      font-weight: 900;
      letter-spacing: -0.02em;
      min-height: 3.5rem;
      text-align: center;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: var(--space-8);
      text-align: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .stat-value {
      font-size: var(--font-size-xl);
      font-weight: 900;
      color: var(--color-accent);
    }

    .stat-label {
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <div id="nav-placeholder" data-tool="coin" data-mode="ui"></div>
  <script src="../../shared/nav.js"></script>

  <main class="page" style="gap:var(--space-6);">

    <div class="tool-header animate-reveal">
      <h1>🪙 Coin Flip</h1>
    </div>

    <!-- Coin -->
    <div class="coin-scene animate-reveal">
      <div class="coin" id="coin">
        <div class="coin-face heads">H</div>
        <div class="coin-face tails">T</div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-text animate-reveal" id="resultText" aria-live="polite">—</div>

    <!-- Button -->
    <button id="flipBtn" class="btn btn-primary btn-large animate-reveal">Flip</button>

    <!-- Stats -->
    <div class="card animate-reveal" style="width:100%;max-width:280px;">
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="headsCount">0</div>
          <div class="stat-label">Heads</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="tailsCount">0</div>
          <div class="stat-label">Tails</div>
        </div>
      </div>
    </div>

  </main>

  <script>
    let isFlipping = false;
    let heads = 0, tails = 0, total = 0;

    const coinEl     = document.getElementById('coin');
    const flipBtn    = document.getElementById('flipBtn');
    const resultText = document.getElementById('resultText');
    const headsEl    = document.getElementById('headsCount');
    const tailsEl    = document.getElementById('tailsCount');
    const totalEl    = document.getElementById('totalCount');

    function flip() {
      if (isFlipping) return;
      isFlipping = true;
      flipBtn.disabled = true;
      resultText.textContent = '…';

      const isHeads = Math.random() < 0.5;

      // Remove existing animation classes and force reflow
      coinEl.classList.remove('flip-heads', 'flip-tails');
      void coinEl.offsetWidth;

      coinEl.classList.add(isHeads ? 'flip-heads' : 'flip-tails');

      setTimeout(() => {
        const result = isHeads ? 'Heads' : 'Tails';
        resultText.textContent = result;
        resultText.style.color = isHeads ? 'var(--color-warning)' : 'var(--color-text)';

        total++;
        if (isHeads) heads++; else tails++;
        headsEl.textContent = heads;
        tailsEl.textContent = tails;
        totalEl.textContent = total;

        isFlipping = false;
        flipBtn.disabled = false;
      }, 1200);
    }

    flipBtn.addEventListener('click', flip);

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !e.target.matches('button')) {
        e.preventDefault();
        flip();
      }
    });
  </script>

</body>
</html>
