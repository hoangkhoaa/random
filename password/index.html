<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>password — random</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>

  <div id="nav-placeholder" data-tool="password" data-mode="text"></div>
  <script src="../shared/nav.js"></script>

  <main class="page">
    <div class="tool-header animate-reveal">
      <h1>🔑 Password</h1>
      <p>16 characters — cryptographically random</p>
    </div>

    <div id="result" class="result-display animate-reveal"
         style="font-size:clamp(1.2rem,4vw,2rem);font-family:'Courier New',monospace;word-break:break-all;text-align:center;max-width:400px;"
         aria-live="polite">—</div>

    <div style="display:flex;gap:var(--space-3);">
      <button class="btn btn-primary btn-large" onclick="generate()">Generate</button>
      <a href="ui/index.html" class="btn btn-ghost btn-large">Visual →</a>
    </div>
  </main>

  <script>
    const LOWER   = 'abcdefghijkmnopqrstuvwxyz';
    const UPPER   = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const DIGITS  = '23456789';
    const SYMBOLS = '!@#$%^&*-_=+?';
    const ALL = LOWER + UPPER + DIGITS + SYMBOLS;

    function randomIndex(max) {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return arr[0] % max;
    }

    function generate() {
      const len = 16;
      const chars = Array.from({ length: len }, () => ALL[randomIndex(ALL.length)]);
      // Fisher-Yates shuffle
      for (let i = chars.length - 1; i > 0; i--) {
        const j = randomIndex(i + 1);
        [chars[i], chars[j]] = [chars[j], chars[i]];
      }
      const password = chars.join('');
      const el = document.getElementById('result');
      el.classList.remove('animate-reveal');
      void el.offsetWidth;
      el.classList.add('animate-reveal');
      el.textContent = password;
    }
    generate();
  </script>

</body>
</html>
